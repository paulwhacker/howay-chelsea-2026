<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Chelsea is Better than Newcastle 2026</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      text-align: center;

      overflow: hidden;

      font-family: Arial, Helvetica, sans-serif;

      color: white;

      background:

        repeating-linear-gradient(
          to right,
          rgba(255,255,255,0.025) 0px,
          rgba(255,255,255,0.025) 40px,
          rgba(0,0,0,0.12) 40px,
          rgba(0,0,0,0.12) 80px
        ),

        radial-gradient(
          circle at top left,
          rgba(255,255,255,0.08),
          transparent 25%
        ),

        linear-gradient(
          135deg,
          #001f3f 0%,
          #000000 45%,
          #0a0a0a 100%
        );
    }

    .background-glow {
      position: absolute;

      width: 1200px;
      height: 1200px;

      background:
        radial-gradient(
          circle,
          rgba(255,255,255,0.04),
          transparent 70%
        );

      animation: rotateGlow 30s linear infinite;

      z-index: 0;
    }

    @keyframes rotateGlow {

      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .container {
      position: relative;
      z-index: 2;

      width: 100%;
      max-width: 1000px;

      padding: 40px;
    }

    .logo {
      width: 280px;
      max-width: 75vw;

      margin-bottom: 40px;

      border-radius: 22px;

      box-shadow:
        0 0 60px rgba(255,255,255,0.18);

      transition: 0.35s ease;
    }

    .logo:hover {
      transform: scale(1.03);
    }

    h1 {
      font-size: clamp(42px, 7vw, 86px);

      line-height: 1.02;

      margin-bottom: 28px;

      text-transform: uppercase;

      letter-spacing: 2px;
    }

    .subtitle {
      font-size: 24px;

      opacity: 0.82;

      margin-bottom: 50px;

      line-height: 1.5;
    }

    .event-box {
      display: inline-block;

      padding: 32px 42px;

      border-radius: 22px;

      background: rgba(255,255,255,0.06);

      backdrop-filter: blur(8px);

      margin-bottom: 45px;

      box-shadow:
        0 0 40px rgba(255,255,255,0.05);
    }

    .date {
      font-size: 34px;
      font-weight: bold;

      margin-bottom: 12px;
    }

    .time {
      font-size: 28px;

      opacity: 0.92;

      margin-bottom: 24px;
    }

    .competition {
      font-size: 20px;

      line-height: 1.7;

      opacity: 0.88;

      padding-top: 20px;

      border-top:
        1px solid rgba(255,255,255,0.12);

      margin-top: 20px;
    }

    .address {
      margin-top: 28px;

      font-size: 20px;

      line-height: 1.7;

      opacity: 0.82;
    }

    .button-row {
      margin-top: 45px;

      display: flex;
      justify-content: center;

      gap: 20px;

      flex-wrap: wrap;
    }

    .button {
      display: inline-block;

      padding: 18px 34px;

      border-radius: 14px;

      text-decoration: none;

      font-size: 18px;
      font-weight: bold;

      transition: 0.25s ease;
    }

    .map-button {
      background: white;
      color: black;
    }

    .map-button:hover {
      transform: scale(1.05);

      background: #dcdcdc;
    }

    .contact-info {
      margin-top: 35px;

      font-size: 20px;

      line-height: 1.8;

      opacity: 0.82;

      letter-spacing: 1px;
    }

    .footer {
      margin-top: 70px;

      opacity: 0.45;

      font-size: 13px;

      letter-spacing: 4px;
    }

    @media (max-width: 700px) {

      .container {
        padding: 30px 20px;
      }

      .logo {
        width: 220px;
      }

      .subtitle {
        font-size: 20px;
      }

      .event-box {
        width: 100%;
      }

      .date {
        font-size: 28px;
      }

      .time {
        font-size: 24px;
      }

      .competition {
        font-size: 18px;
      }

      .address {
        font-size: 18px;
      }

      .button {
        width: 100%;
      }

      .button-row {
        flex-direction: column;
      }
    }

  </style>
</head>

<body>

  <div class="background-glow"></div>

  <div class="container">

    <img
      src="images/chenew-logo-2.png"
      alt="Chelsea is Better than Newcastle 2026"
      class="logo"
    />

    <h1>
      Chelsea is Better than Newcastle 2026
    </h1>

    <div class="subtitle">
      Summer Gathering • Football Propaganda • Drinks • Chaos
    </div>

    <div class="event-box">

      <div class="date">
        Saturday June 6, 2026
      </div>

      <div class="time">
        4:00 PM
      </div>

      <div class="competition">
        ⛳ Long-Drive Competition — 6:00 PM
      </div>

      <div class="address">
        8137 110th St<br>
        Delta, BC V4C 4H8
      </div>

    </div>

    <div class="button-row">

      <a
        class="button map-button"
        href="https://maps.google.com/?q=8137+110th+St+Delta+BC+V4C+4H8"
        target="_blank"
      >
        OPEN MAP
      </a>

    </div>

    <div class="contact-info">
      RSVP / Questions<br>
      236-887-6968
    </div>

    <div class="footer">
      INVITATION ONLY
    </div>

  </div>

</body>
</html>
